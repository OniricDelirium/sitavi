<!DOCTYPE html>

<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://thymeleaf.org"
      xmlns:sec="http://thymeleaf.org/thymeleaf-extras-springsecurity6">
    <head th:replace="~{/layout/plantilla :: head}">
        <title>Pruebas</title>
        <meta charset="UTF-8"/> <!-- Alfabeto -->
    </head>
    <body>

        <!-- 1 Sección donde se muestran las recetas-->

        <section th:fragment="recetas" class="container my-5">
            <div class="row"> <!-- Contenedor de la fila -->
                <div class="col-md-6"> 
                    <div class="left-box"> <!-- Cuadro en blanco -->
                        <div class="row align-items-center">
                            <h2 class="section-title text-center">[[#{blog.recetas}]]</h2>
                            <p class="text-muted text-center">[[#{aplicacion.titulo}]]</p>
                        </div>

                        <h5 class="brand text-center mb-3">[[#{recetas.mensaje}]]</h5>
                        <p class="justify">[[#{recetas.mensaje2}]]</p>
                        <p class="justify">[[#{recetas.mensaje3}]]</p>
                        <p class="text-center brand" style="color: #4CAF50">[[#{recetas.mensaje4}]]</p>
                    </div>
                </div>

                <!-- Cuadro de Tarjetas a la Derecha -->
                <div class="col-md-6">
                    <div class="right-box p-4">
                        <div class="row g-4 justify-content-center">
                            <!-- Tarjeta 1 -->
                            <div class="col-10">
                                <div class="card">
                                    <img src="/Barritas_Granola.jpg" 
                                         class="card-img-top img-fluid" 
                                         alt="Barritas de Granola"/>
                                    <div class="card-body d-flex justify-content-between align-items-center">
                                        <h5 class="card-title mb-0">Barritas de Granola</h5>
                                        <a class="btn btn-primary" href="#" role="button">Ver más</a>
                                    </div>
                                </div>
                            </div>

                            <!-- Tarjeta 2 -->
                            <div class="col-10">
                                <div class="card">
                                    <img src="/Galletas_Granola.jpg" 
                                         class="card-img-top img-fluid" 
                                         alt="Galletas de Granola"/>
                                    <div class="card-body d-flex justify-content-between align-items-center">
                                        <h5 class="card-title mb-0">Galletas de Granola</h5>
                                        <a class="btn btn-primary" href="#" role="button">Ver más</a>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
        
    </body>
</html>
